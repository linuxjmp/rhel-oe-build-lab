---
# group_vars/all.yml
#
# Variables visible to every host in the inventory. Role defaults
# live in roles/<role>/defaults/main.yml — only override here when a
# value should be the same across the whole estate AND differ from
# the role default.

# CRQ-002: dedicated admin user (key-based, no password).
# Created on all hosts by the users role in 01-baseline.yml.
users_list:
  - name: admin
    comment: "Lab Admin Account"
    groups:
      - admin
      - wheel
    shell: /bin/bash
    ssh_authorized_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOmNeH7j7M62hxy7WTncpdpImsWarqm/Z4CHGCi1wg+U root@rhce-control"

# CRQ-002: disable direct root SSH once admin key login is verified.
# Consumed by the ssh role (split out under CRQ-004) and applied by
# 01-baseline.yml --tags ssh after key login is confirmed working.
ssh_permit_root_login: "no"
