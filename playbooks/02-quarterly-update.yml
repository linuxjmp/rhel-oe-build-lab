---
# 02-quarterly-update.yml
#
# Applies the quarterly patch cycle to [production], one host at a
# time, and writes a per-host Markdown report to reports/.
#
# Flow:
#   1. patching role   — snapshot → update → reboot check → post-snapshot
#   2. post-patch gate — inline health checks on the just-patched host
#   3. report task     — renders quarterly_report.md.j2 on localhost
#   4. rollout gate    — assert the host is healthy; a failure here
#                        halts the serial rollout before the next host
#
# The gate (CRQ-003) is what makes serial: 1 meaningful — if patching
# leaves a host with a dead service, a non-enforcing SELinux, broken
# time sync, or any unit in the failed state, the play stops and the
# remaining hosts are never touched. The report is still written for
# the failed host so there is evidence to attach to the change record.
#
# Usage
# -----
#   # Dry-run against a canary host first:
#   ansible-playbook playbooks/02-quarterly-update.yml \
#     --check --diff --limit servera
#
#   # Apply to the canary, then inspect the report:
#   ansible-playbook playbooks/02-quarterly-update.yml --limit servera
#   cat reports/*-servera.md
#
#   # Apply to the full fleet (after canary is clean):
#   ansible-playbook playbooks/02-quarterly-update.yml
#
#   # Allow automatic reboots (unattended pipeline):
#   ansible-playbook playbooks/02-quarterly-update.yml \
#     -e patching_allow_reboot=true
#
#   # Security errata only (instead of full update):
#   ansible-playbook playbooks/02-quarterly-update.yml \
#     -e patching_update_mode=security

- name: Quarterly Operating Environment update
  hosts: production
  become: true

  # Staged rollout: one host at a time. A failure stops the play
  # before it reaches the next host. Raise to '2' or '25%' once
  # the update is confirmed clean on a canary.
  serial: 1
  max_fail_percentage: 0

  vars:
    quarterly_reports_dir: "{{ playbook_dir }}/../reports"

    # Services that must still be active on the host after patching.
    # If any is not 'active', the post-patch gate fails the host.
    quarterly_gate_services:
      - firewalld
      - auditd
      - chronyd
      - sshd

  pre_tasks:
    - name: Ensure reports directory exists on the control node
      ansible.builtin.file:
        path: "{{ quarterly_reports_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      become: false
      tags: [always]

  tasks:
    # The patching role takes pre/post snapshots, applies updates,
    # checks the reboot requirement, and publishes patching_* facts.
    - name: Apply quarterly patches
      ansible.builtin.import_role:
        name: patching
      tags: [patching]

    # ----------------------------------------------------------------
    # Post-patch health checks (CRQ-003)
    #
    # These run on the just-patched host. Each collects state with
    # failed_when: false so we can assemble a single, readable list of
    # problems and still render the report before halting the rollout.
    # ----------------------------------------------------------------

    - name: Collect SELinux state after patching
      ansible.builtin.command:
        cmd: getenforce
      register: q_selinux
      changed_when: false
      check_mode: false
      tags: [gate]

    - name: Collect baseline service activity after patching
      ansible.builtin.command:
        cmd: "systemctl is-active {{ item }}"
      register: q_services
      changed_when: false
      failed_when: false
      check_mode: false
      loop: "{{ quarterly_gate_services }}"
      tags: [gate]

    - name: Collect systemd units left in the failed state
      ansible.builtin.command:
        cmd: systemctl list-units --state=failed --no-legend --plain
      register: q_failed_units
      changed_when: false
      check_mode: false
      tags: [gate]

    - name: Collect chrony time-sync status
      ansible.builtin.command:
        cmd: chronyc tracking
      register: q_chrony
      changed_when: false
      failed_when: false
      check_mode: false
      tags: [gate]

    - name: Assemble the post-patch failure list
      ansible.builtin.set_fact:
        quarterly_validation_failures: >-
          {{
            (q_services.results
               | rejectattr('stdout', 'equalto', 'active')
               | map(attribute='item')
               | map('regex_replace', '^(.*)$', 'service \1 is not active')
               | list)
            + (q_failed_units.stdout_lines
               | map('regex_replace', '^\s*(\S+).*$', 'unit \1 is in the failed state')
               | list)
            + ([] if (q_selinux.stdout | trim == 'Enforcing')
               else ['SELinux is ' ~ (q_selinux.stdout | trim) ~ ', expected Enforcing'])
            + ([] if ('Leap status     : Normal' in q_chrony.stdout)
               else ['chrony Leap status is not Normal (time sync degraded)'])
          }}
      tags: [gate]

    # Render a per-host Markdown report on the control node using the
    # patching_* facts published by the role above. Runs even when the
    # gate below will fail, so the report exists as evidence.
    - name: Render per-host quarterly update report
      ansible.builtin.template:
        src: quarterly_report.md.j2
        dest: >-
          {{ quarterly_reports_dir }}/{{ ansible_date_time.iso8601_basic_short }}-{{ inventory_hostname }}.md
        mode: '0644'
      delegate_to: localhost
      become: false
      tags: [report]

    # ----------------------------------------------------------------
    # Rollout gate (CRQ-003)
    #
    # With serial: 1 and max_fail_percentage: 0, a failed assert here
    # aborts the whole play, so the next host is never patched. The
    # report for this host has already been written above.
    # ----------------------------------------------------------------
    - name: Gate the rollout on post-patch health
      ansible.builtin.assert:
        that:
          - quarterly_validation_failures | length == 0
        fail_msg: >-
          Post-patch validation FAILED on {{ inventory_hostname }} —
          halting the rollout before the next host.
          Issues: {{ quarterly_validation_failures | join('; ') }}.
          See the report in reports/ and run
          playbooks/04-rollback-checklist.yml --limit {{ inventory_hostname }}.
        success_msg: >-
          Post-patch validation passed on {{ inventory_hostname }} —
          safe to continue to the next host.
      tags: [gate]
