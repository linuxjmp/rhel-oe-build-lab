# Project-scoped Ansible configuration for rhel-oe-build-lab.
#
# Pinning ansible.cfg in the repo root makes automation reproducible
# regardless of any ~/.ansible.cfg or /etc/ansible/ansible.cfg on
# the control node. Anyone who clones the repo and runs
# ansible-playbook gets identical behavior.

[defaults]
# Inventory and role discovery are pinned to the repo so contributors
# do not need -i on every command.
inventory               = ./inventory
roles_path              = ./roles
collections_paths       = ./collections

# .retry files are noise in a Git repo; CI/operator memory tracks
# failures instead.
retry_files_enabled     = False

# Lab convenience. In production, host_key_checking should be True
# with a managed known_hosts file on the control node.
host_key_checking       = False

# 10 forks is reasonable for a small fleet. Raise for larger
# inventories; lower if managed hosts have constrained SSH capacity.
forks                   = 10

# 'smart' gathers facts once per host per run. Caching keeps facts
# across runs so validation playbooks start faster.
gathering               = smart
fact_caching            = jsonfile
fact_caching_connection = ./.ansible_facts
fact_caching_timeout    = 7200

# YAML output is far easier to read than the default callback when
# triaging a failed playbook. profile_tasks surfaces slow tasks.
stdout_callback         = ansible.builtin.default
result_format           = yaml
callbacks_enabled       = profile_tasks, timer

# Per-repo run log makes it trivial to attach output to a change
# record. ansible.log is gitignored.
log_path                = ./ansible.log

# Suppress the deprecation warning on hosts shipping multiple Pythons.
interpreter_python      = auto_silent

[privilege_escalation]
become                  = True
become_method           = sudo
become_user             = root
become_ask_pass         = False

[ssh_connection]
# Pipelining cuts SSH overhead substantially; safe as long as
# 'Defaults requiretty' is NOT set in sudoers on managed hosts.
pipelining              = True
ssh_args                = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey
